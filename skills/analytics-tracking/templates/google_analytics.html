<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XXXXXXXXXX');
  
  // Enhanced configuration with page view tracking
  gtag('config', 'G-XXXXXXXXXX', {
    'page_title': document.title,
    'page_location': window.location.href,
    'page_path': window.location.pathname
  });
  
  // Event tracking helper function
  function trackGAEvent(eventName, eventParams = {}) {
    gtag('event', eventName, eventParams);
  }
  
  // Example: Track button clicks
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('[data-ga-event]').forEach(button => {
      button.addEventListener('click', function() {
        const eventName = this.getAttribute('data-ga-event');
        const eventCategory = this.getAttribute('data-ga-category') || 'engagement';
        const eventLabel = this.getAttribute('data-ga-label') || this.textContent;
        
        trackGAEvent(eventName, {
          'event_category': eventCategory,
          'event_label': eventLabel,
          'value': 1
        });
      });
    });
  });
</script>
