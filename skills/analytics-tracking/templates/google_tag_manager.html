<script>
// Data Layer initialization
window.dataLayer = window.dataLayer || [];

// Example: Push page view to dataLayer
dataLayer.push({
  'event': 'page_view',
  'page_title': document.title,
  'page_location': window.location.href,
  'page_path': window.location.pathname,
  'user_agent': navigator.userAgent
});

// Example: Custom event tracking function
function trackGTMEvent(eventName, eventData = {}) {
  dataLayer.push({
    'event': eventName,
    ...eventData
  });
}

// Example: Track form submissions
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', function(event) {
      const formId = this.id || 'unnamed_form';
      const formName = this.getAttribute('name') || formId;
      
      trackGTMEvent('form_submit', {
        'form_id': formId,
        'form_name': formName,
        'form_action': this.action
      });
    });
  });
});
</script>
